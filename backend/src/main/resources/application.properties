quarkus.application.name=pawket-backend
quarkus.http.port=8080
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://127.0.0.1:4173,http://localhost:4173
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,Idempotency-Key,X-User-Id,X-Correlation-Id

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:pawket}
quarkus.datasource.password=${DB_PASSWORD:pawket}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5433/pawket}
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.hibernate-orm.jdbc.timezone=UTC
quarkus.flyway.migrate-at-start=true

quarkus.oidc.enabled=${OIDC_ENABLED:false}
%prod.quarkus.oidc.enabled=true
%prod.quarkus.http.auth.proactive=true
quarkus.smallrye-openapi.info-title=Pawket API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Private lifetime profiles and memories for pets.

pawket.auth.dev-user-id=${DEV_USER_ID:00000000-0000-0000-0000-000000000001}
pawket.admin.user-ids=${ADMIN_USER_IDS:}
pawket.storage.endpoint=${S3_ENDPOINT:http://localhost:9000}
pawket.storage.public-endpoint=${S3_PUBLIC_ENDPOINT:http://localhost:9000}
pawket.storage.region=${S3_REGION:us-east-1}
pawket.storage.bucket=${S3_BUCKET:pawket-media}
pawket.storage.access-key=${S3_ACCESS_KEY:pawket}
pawket.storage.secret-key=${S3_SECRET_KEY:pawket-local-secret}
pawket.storage.upload-ttl=${S3_UPLOAD_TTL:10M}
pawket.media.cleanup.every=${MEDIA_CLEANUP_EVERY:1h}
pawket.media.cleanup.pending-retention=${MEDIA_PENDING_RETENTION:2h}
pawket.media.cleanup.ready-retention=${MEDIA_READY_RETENTION:24h}
pawket.media.cleanup.deleted-retention=${MEDIA_DELETED_RETENTION:1h}

%test.quarkus.oidc.enabled=false
%test.quarkus.hibernate-orm.schema-management.strategy=validate
%test.quarkus.otel.sdk.disabled=true
%test.pawket.media.cleanup.every=off
%test.pawket.admin.user-ids=00000000-0000-0000-0000-000000000001
