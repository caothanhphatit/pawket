services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pawket
      POSTGRES_USER: pawket
      POSTGRES_PASSWORD: pawket
    ports:
      - "5433:5432"
    volumes:
      - pawket-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawket -d pawket"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pawket
      MINIO_ROOT_PASSWORD: pawket-local-secret
      MINIO_API_CORS_ALLOW_ORIGIN: http://127.0.0.1:4173,http://localhost:4173
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - pawket-minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 pawket pawket-local-secret; do sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/pawket-media;
      /usr/bin/mc anonymous set none local/pawket-media;
      "

volumes:
  pawket-postgres:
  pawket-minio:
